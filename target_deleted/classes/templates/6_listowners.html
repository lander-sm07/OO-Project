<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>List visitors</title>
</head>
<body>
    <h3>Our visitors:</h3>

    <ol>
        <li th:each="visitor : ${visitors}">
            <span th:text="${visitor.getFirstName() + ' ' + visitor.getSurName()}"></span>
            <ul>
                <li th:text="'year of birth: ' + ${visitor.getYearOfBirth()}"></li>
                <li th:text="'park code: ' + ${visitor.getThemeParkCode()}"></li>
                <li>wish list:
                <ul>
                    <li th:each="wish:${visitor.getWishList()}" th:text="${wish}"></li>
                </ul>
                </li>
            </ul>
        </li>
    </ol>
    <a href="/" >Back to home page</a>
</body>
</html>
